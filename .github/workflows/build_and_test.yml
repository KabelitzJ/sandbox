name: Build and test

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build and test on ubuntu-latest using ${{matrix.compiler}}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++]

    steps:
    - uses: actions/checkout@v2

    - name: Update
      run: sudo apt-get update -y

    - name: Install build essentials
      run: sudo apt-get install -y build-essential xorg-dev

    - name: install conan
      run: pip install conan

    - name: Install dependencies
      run: conan install . --install-folder build --build missing

    - name: Configure CMake
      env:
        CXX: ${{matrix.compiler}}
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DSBX_BUILD_TESTS=True

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      run: ${{github.workspace}}/build/bin/tests/sbx_tests
  
