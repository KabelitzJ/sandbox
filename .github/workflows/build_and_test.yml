name: Build and test

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build and test on ubuntu-latest using ${{matrix.compiler}}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]

    steps:
    - uses: actions/checkout@v2

    - name: Configure CMake
      env:
        CXX: ${{matrix.compiler}}
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DSBX_BUILD_TESTS=True

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}
  
